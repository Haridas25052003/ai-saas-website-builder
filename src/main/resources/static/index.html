<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Website Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-dark text-white">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-black px-4 py-3 border-bottom border-secondary">
    <span class="navbar-brand fw-bold fs-4">⚡ AI Website Builder</span>
    <span class="text-secondary small">Powered by OpenAI GPT</span>
</nav>

<!-- Main Content -->
<div class="container py-5">

    <!-- Heading -->
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold">Generate a Website with AI</h1>
        <p class="text-secondary fs-5">Describe the website you want — AI will build it instantly.</p>
    </div>

    <!-- Prompt Card -->
    <div class="card bg-black border border-secondary rounded-4 shadow p-4 mx-auto" style="max-width: 720px;">

        <label for="promptInput" class="form-label text-secondary small text-uppercase fw-bold mb-2">
            Your Prompt
        </label>

        <textarea
                id="promptInput"
                class="form-control bg-dark text-white border-secondary rounded-3 mb-3"
                rows="4"
                placeholder="Example: Create a modern dark portfolio website for a Java developer with a hero section and projects section..."
        ></textarea>

        <button id="generateBtn" class="btn btn-primary w-100 py-2 fw-bold fs-5 rounded-3">
            ✨ Generate Website
        </button>

        <!-- Error message -->
        <div id="errorMsg" class="alert alert-danger mt-3 d-none" role="alert"></div>

    </div>

    <!-- Loading Spinner (hidden by default) -->
    <div id="loadingSection" class="text-center mt-5 d-none">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
        <p class="text-secondary mt-3">AI is generating your website...</p>
    </div>

    <!-- Preview Section (hidden until response arrives) -->
    <div id="previewSection" class="mt-5 d-none">
        <h4 class="mb-3 fw-bold">🖥️ Live Preview</h4>

        <!-- The iframe renders the generated website safely in a sandbox -->
        <iframe
                id="previewFrame"
                class="w-100 rounded-4 border border-secondary"
                style="height: 600px; background: white;"
                sandbox="allow-scripts"
        ></iframe>
    </div>

</div>

<!-- Add this block just before the closing </div> of the container, after previewSection -->

<!-- History Section -->
<div class="mt-5" id="historySection">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold mb-0">📁 Recent Projects</h4>
        <button class="btn btn-sm btn-outline-secondary" id="refreshHistoryBtn">↻ Refresh</button>
    </div>
    <div id="historyList" class="row g-3">
        <!-- Cards injected by JS -->
    </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Our custom JS -->
<script src="/js/app.js"></script>

</body>
</html>
